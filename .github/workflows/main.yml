name: NSE Watchlist Auto-Update

on:
  schedule:
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  update-watchlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pandas

      - name: Run auto-discovery and results updater
        run: python auto_update.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit and push changes
        run: |
          git config --global user.name  "NSE Watchlist Bot"
          git config --global user.email "bot@nse-watchlist.com"
          git add data.py
          git diff --staged --quiet || git commit -m "Auto-update: NSE results $(date +'%d-%b-%Y %H:%M IST')"
          git push
